name: CD pipeline

on:
  workflow_run:
    workflows: ["CI pipeline"]
    types:
      - completed

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy nginx config
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/web_app
            cat > ~/web_app/nginx/nginx.conf << 'EOF'
            events {
                worker_connections 1024;
            }
            http {
                server {
                    listen 80;
                    server_name notes-api.duckdns.org;
                    location /.well-known/acme-challenge/ {
                        root /var/www/certbot;
                    }
                    location / {
                        return 301 https://$host$request_uri;
                    }
                }
                server {
                    listen 443 ssl;
                    server_name notes-api.duckdns.org;
                    ssl_certificate /etc/letsencrypt/live/notes-api.duckdns.org/fullchain.pem;
                    ssl_certificate_key /etc/letsencrypt/live/notes-api.duckdns.org/privkey.pem;
                    location / {
                        proxy_pass http://172.19.0.1:30080;
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                    }
                }
            }
            EOF

            if [ -f ~/web_app/certbot/conf/live/notes-api.duckdns.org/fullchain.pem ]; then
              docker compose -f docker-compose.prod.yml restart nginx
            else
              echo "Certificates not found, skipping nginx restart"
            fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Create k8s secret
        run: |
          kubectl create secret generic api-secrets \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --from-literal=SECRET_KEY=${{ secrets.SECRET_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to k3s
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment/api-deployment
          kubectl rollout status deployment/api-deployment --timeout=60s

  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy nginx config
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/web_app
            cat > ~/web_app/nginx/nginx.conf << 'EOF'
            events {
                worker_connections 1024;
            }
            http {
                server {
                    listen 80;
                    server_name notes-api.duckdns.org;
                    location /.well-known/acme-challenge/ {
                        root /var/www/certbot;
                    }
                    location / {
                        return 301 https://$host$request_uri;
                    }
                }
                server {
                    listen 443 ssl;
                    server_name notes-api.duckdns.org;
                    ssl_certificate /etc/letsencrypt/live/notes-api.duckdns.org/fullchain.pem;
                    ssl_certificate_key /etc/letsencrypt/live/notes-api.duckdns.org/privkey.pem;
                    location / {
                        proxy_pass http://172.19.0.1:30080;
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                    }
                }
            }
            EOF

            if [ -f ~/web_app/certbot/conf/live/notes-api.duckdns.org/fullchain.pem ]; then
              docker compose -f docker-compose.prod.yml restart nginx
            else
              echo "Certificates not found, skipping nginx restart"
            fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Create k8s secret
        run: |
          kubectl create secret generic api-secrets \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --from-literal=SECRET_KEY=${{ secrets.SECRET_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to k3s
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment/api-deployment
          kubectl rollout status deployment/api-deployment --timeout=60s

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
