name: CD pipeline

on:
  workflow_run:
    workflows: ["CI pipeline"]
    types:
      - completed

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx/,certbot/"
          target: "~/web_app"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/web_app/nginx ~/web_app/certbot
            cd ~/web_app
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            PREVIOUS=$(docker inspect notes-api --format='{{.Config.Image}}' 2>/dev/null || echo "")

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            sleep 10
            if ! curl -f http://localhost/health; then
              echo "Healthcheck failed, rolling back"
              docker stop notes-api || true
              docker rm notes-api || true
              docker run -d \
                --name notes-api \
                --network web_app_app-net \
                -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
                $PREVIOUS
              exit 1
            fi

  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx/,certbot/"
          target: "~/web_app"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/web_app/nginx ~/web_app/certbot
            cd ~/web_app
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            PREVIOUS=$(docker inspect notes-api --format='{{.Config.Image}}' 2>/dev/null || echo "")

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            sleep 10
            if ! curl -f http://localhost/health; then
              echo "Healthcheck failed, rolling back"
              docker stop notes-api || true
              docker rm notes-api || true
              docker run -d \
                --name notes-api \
                --network web_app_app-net \
                -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
                $PREVIOUS
              exit 1
            fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
