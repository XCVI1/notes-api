events {
	worker_connections 1024;
}

http {
	server {
		listen 80;
		server_name localhost;

		location /.well-known/acme-challenge/ {
			root /var/www/cerbot;
		}

		location / {
			proxy_pass http://notes-api:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
		}
	}
}
