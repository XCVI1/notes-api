events {
	worker_connections 1024;
}

http {
	server {
		listen 80;
		server_name notes-api.duckdns.org;

		location /.well-known/acme-challenge/ {
			root /var/www/certbot;
		}

		location / {
			return 301 https://$host$request_uri;
		}
	}

	server {
		listen 443 ssl;
		server_name notes-api.duckdns.org;

		ssl_certificate /etc/letsencrypt/live/notes-api.duckdns.org/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/notes-api.duckdns.org/privkey.pem;

		location / {
			proxy_pass http://notes-api:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
		}
	}

}
